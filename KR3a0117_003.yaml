body:
  text: 松陽鈔存䟦先王父之宰靈夀也靈夀别名松陽又為衛水所經故當時與諸生講學之書名松陽講義而鈔存舊名衛濱曰鈔亦名松陽鈔存葢靈夀簿書之暇所定故咸冠以松陽誌其地也鈔存取諸問學録日記為多殆輯其粹語以示後學實無可増損正誼堂刻先王父遺書四種讀禮志疑讀朱隨筆二書全刻至鈔存及問學録均有刪節行世既久㡬失其真憲業師惕齋楊姑夫邃精性理于先王父諸書最所熟習謂鈔存一册不宜刪節因全書艱于剞劂同門先請鎸是書遂相協力三月告成然後先王父閑先聖闢異學之㫖朗然如日中天即此七十五條大㫖已具見矣嗚呼手澤猶存淵源莫續詩曰無念爾祖聿修厥徳憲于此自勉還自愧焉孫男申憲百拜謹䟦
