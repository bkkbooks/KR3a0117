body:
  text: 松陽鈔存儒家類提要臣等謹案松陽鈔存二卷國朝陸隴其撰隴其有三魚堂四書大全别著録是編乃其為靈夀知縣時於簿書之暇所輯問學録日記二書摘其中切要之語録為一編以示學者靈夀古松陽地故以松陽鈔存為名本七十八條儀封張伯行嘗為刋板刪其與問學録重複者僅存二十八條殊失隴其之意此本刋於乾隆辛未乃金山楊開基所重編分道體為學處事教學辨學術觀聖賢六門仍以原第㡬條注於本條之下以存其舊而别以己見附識於後前有開基序稱學問録為中年之書此本為晚年手定之書極論伯行之刪本為非又有隴其孫申憲跋亦謂伯行刻隴其遺書四種惟讀禮識疑讀朱隨筆為足本此書及問學録均刪節失真云乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀松陽鈔存序松陽鈔存二卷共七十八條當湖先生摘自著問學録及隨記中有闗學術人心及先儒未發之語重録成冊以惠後學者也先生精義微言不盡于此書而晚年審定為迷者指途已該先生講道之大㫖儀封張清恪公曾有刋本僅二十八條葢儀封見問學録中多與此同故刪去過半不知問學録乃先生中年之書而此則先生晚年所審定也即如論善人一條問學録以為中行狂狷各有善人顯與朱子善人畫定無進步之解不合鈔存内則將此條削去其半改從朱子困勉續録内壬申所記一條正與此同其為晚年手定無疑清恪轉刪抄存而存問學録此條亦未細考矣基久有刋刻此書之意因循未果嵗辛未舘清獻文孫令嘉書塾擬輯陸子全書而功力浩煩未能猝就及門相與慫恿先梓抄存乃勉從其請其附識之語本擬削去而學徒軰以為籍此可以就正有道故亦附存基于此竊有嘆焉夫子朱子後大儒若西山若鸖山若魯齋固謹守繩尺矣自是以迄有明非程朱之學不道然嘗厯選先賢記録其極醇無疵者薛文清讀書録胡文敬居業録羅文莊困知記而止爾他如曹靖修之夜行燭陳布衣之正學纂要專言一事未為全書而顧端文小心劄記髙忠憲語録陳㡬亭學言陸桴亭思辨録其果克繼薛胡羅三君子為朱子功臣乎國朝治教昌隆先生應運而起其著𫐠所係真有以羽翼考亭而維持鄒魯而是書乃其手定則尤心精所繫詎可以少而忽之先生手定尚有雜纂雜抄偶記十餘種行將掇其要語同問學録隨記參定為書以繼讀書居業困知三書之後與天下學者共見先生之全而以此編為乘韋焉爾金山後學楊開基惕齋甫敬識
