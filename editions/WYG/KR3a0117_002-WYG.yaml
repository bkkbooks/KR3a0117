body:
  text: 松陽鈔存卷下贈内閣學士陸隴其撰教學聖人不得中行而與狂狷與之之内有許多裁成輔相之法究竟欲其歸於中行非徒嘉奬之而已也若但知嘉奬則狂者之氣將益髙而狷者之守將益僻其去中行將益逺豈聖人之教乎人多錯認聖人取狂狷之意顧涇陽謂學問當從狂狷起脚是何言歟原第十八條聖人以杖叩原壤此亦因人而施若使遇莊周蘇軾必不如此彼亦必不肯黙受適以啟其不遜耳大扺人之流於異端者有剛柔之不同而聖人之教亦有剛克柔克之不同原壤之叩蓋以剛克柔之法也原第四十五條孔孟毎稱善人明季陳幾亭以善人為中行譚梁生以善人為狂然按朱子語類講論語不得中行章則皆不然語類曰善人只循循自守不㑹勇猛精進循規蹈矩則有餘責之以任道則不足狷者雖非中道然這般人終是有筋骨又曰漢文帝謂之善人武帝却有狂氣象文帝天資雖美然止此而已武帝多有病痛然天資髙足以有為據此則是朱子以善人為謹厚之士今當從之大扺中行狂狷善人有恒皆是以天資言而善人又不如中行有恒又不如狂狷原第三十七條基按問學録原本云大抵善人之類不一有近於狂之善人有近於狷之善人有近於中行之善人善人者任其狂狷中行之質而自成焉者也君子者因其狂狷中行之質而裁成焉者也語類曰善人云云據此則又似以善人為謹厚之士愚謂有近於謹厚之善人而不可謂善人止謹厚之士也謂善人不及狂狷止可指近於謹厚之一種而不可以此該善人也朱子此條宜善㑹永樂時輯大全刪去善人字甚有見此論不主語類廬陵王勉軒見之謂顯與朱子不合疑非定論此時尚未見鈔存全本也今讀此條先生改定仍從語類可見鈔存為定論儀封刻本刪鈔存而存問學録殊失先生意矣孔子之時虛無寂滅自託於上達之說尚少故孔子教人只從下學說起使其循序漸進朱子之時異端之說方且共託於上達而浸灌於學者之耳不先去其疾則孰肯從事於吾所謂下學哉故凡朱子之言性天道言上達者皆所以先去其疾薛文清曰孔子教人說下學處極多說上達處極少至宋諸老先生多將本原𤼵以示人亦時不得不然耳蓋此之謂也原第五十七條基按吕東萊先生近思録後序云首卷列隂陽變化性命之說大抵非始學之事祖謙嘗與聞次輯之意後出晚進於義理本原未容驟語茍茫然不識其梗槩則何所底止列之篇端特使知其名義有所嚮望而已東萊此序與此條相𤼵先去其病與粗知名義皆淺一層看所謂時不得不然蓋立教之權法也辨學術象山對朱濟道言収拾精神自立主宰當惻隠時自然惻隠當羞惡時自然羞惡愚按収拾精神而不讀書窮理𤼵出來不能無差且其所謂収拾精神者不免如觀心說之所譏非如程子之主一無適朱子之略綽提撕也安得無病至其所以収拾精神主於自私自利而非主於存天理又無論矣大抵象山陽明景逸念臺皆是収拾精神一路功夫但象山主静陽明則不分動静景逸主静念臺則不分動静象山陽明都不要讀書窮理景逸念臺則略及於讀書窮理象山陽明則指理在心外景逸念臺則指理在心内究竟則一轍原第六條按此條文集亦載日記内無中間觀心說一段基按先生此條評定象山陽明景逸念臺直是等上等來真無可躱閃人但知偏於静者為禪而不知不分動静者亦禪人但知指理在心外者為禪而不知指理在心内者亦禪此條便可當一部學蔀通辨先生日記中尚有一條云指理在心外者如鏡之影指理在心内者如樹之根得失自不同按此於一様之中又分得失剖晰極細而鈔存不載者蓋先生辨學術寜峻其防如此陽明年譜載其將征思田之日與錢緒山王龍溪證道於天泉橋上緒山謂無善無惡是心之體有善有惡是意之動知善知惡是良知為善去惡是格物四語是師門宗旨龍溪謂心體既無善無惡意亦無善無惡知亦無善無惡物亦無善無惡陽明兩存之曰汝中須用徳洪功夫徳洪須透汝中本體吾學無遺念矣愚謂此一條是王學病根其所謂致良知亦是如此依緒山之說則以本於無善無不善者為良依龍溪之說則直以無善無不善者為良總是知有心不知有性若以孟子仁人心也程子性即理也之義求之其說不攻而自破矣不知明季諸儒何以必極力為之回䕶如髙忠憲云陽明無善之說不足以亂性而足以亂教則以性原可謂無善特不可以此教人耳豈性與教有二道乎陳幾亭云陽明所言無者直指本來不着一相非謂有善惡而不分别也衍之於意與事是既有善惡之後仍不分别其學術禍世之罪可勝誅哉自汝中之說倡遂蔑視進退取予無足輕重不見性者為善亦無益見性者為惡亦無傷非惟程朱之閑蕩然而良知之教亦且口實於天下則似陽明無善無惡心之體一語未嘗差特龍溪衍之過當耳果足以服龍溪之心乎幾亭又云孟子言性善未嘗云有善呼性為善猶贊青天為好耳若夫善意善事猶彩霞明星惡意惡事猶黒雲濁霧雖彩霞明星與黒雲濁霧相去逺甚要不可執此霞此星為青天之本體也善意善事性所𤼵也非性所有也性中本無一物夾雜至虚至粹故謂之善孔孟未嘗言有何待後人言無必云無善是無上加無也則似孟子云性善即無善無不善之謂與告子何異乎豈無聲無臭者性而有物有則者非性一物不有者性而萬物皆備者非性乎其言不必無上加無若與陽明稍相左而實深於回䕶陽明者也以景逸幾亭之好學深思亦知姚江末流之弊而不知其病根在昧於心性之辨反從而為之辭甚矣莠苗朱紫之易亂也原第七條王龍溪曰先師首掲良知之教以覺天下學者靡然宗之凡在同門得於見聞之所及者雖良知宗說不敢有違未免各以其性之所近擬議攙和紛成異見有謂良知本寂如鏡之照物明體寂然而妍媸自辨有謂良知是從已𤼵立教非未發無知之本旨有謂良知無見成由於修証而始全有謂良知本來無欲直心以動無不是道不待復加銷欲之功有謂學有主宰有流行而以良知分體用有謂學貴循序求之有本末得之無内外而以致知别終始此皆論學同異之見差若毫釐而其謬乃至千里不容以不辨者也寂者心之本體寂以照為用守其空知而遺照是乖其中也良知原是未𤼵之中無知而無不知若良知之前復求未𤼵即為沉空之見矣見入井之孺子而惻隠見嘑蹴之食而羞惡仁義之心本來完足感觸斯應不學而能也若謂良知由修而後全撓其體也古今立教原為有欲設銷欲正所以復還無欲之體非有所加也主宰即流行之體流行即主宰之用體用一原不可得而分分則離矣所求即得之之因所得即求之之証始終一貫不可得而别别則支矣按龍溪此條言良知之說各自為派如此然總知有心不知有性其或分主宰流行或不分主宰流行或分工夫本體或不分工夫本體皆只是指此昭昭靈靈之知覺非孟子之所謂良知也原第八條基按嘗閌龍溪集滿口是禪固陽明之濫觴也此條特引其言良知各自為派耳若龍溪之純是釋學明季諸儒已明言之先生故不復辨云髙景逸先生之學見於先生所謂困學記者大略謂始讀大學或問見朱子言入道之要莫如敬故專用力於肅恭収斂持心方寸間但覺氣鬰身拘及放下又散漫如故繼見程子謂心要在腔子裏解者曰腔子猶言身子耳大喜以為心不專在方寸渾身是心也頓自快然及謫官赴揭陽於舟中嚴立規程以半日静坐半日讀書將程朱所示誠敬主静觀喜怒哀樂未發諸法一一叅求覺心氣澄清時便有塞乎天地氣象第不能常過汀州陸行憇旅舍小樓讀二程書見明道先生曰萬變俱在人其實無一事猛省曰原來如此從前牽纒俄然斬絶至此見六合皆心腔子是其區宇方寸亦其本位神而明之無方所可言也平生深鄙學者張皇言悟此時看作平常自知從此方可下工夫耳甲辰顧涇陽先生始作東林精舍大得明友講習之功徐而騐之終不可無端居静定之力葢各人病痛不同大聖賢必有大精神其主静只在尋常日用中學者神短氣浮便須數十年静力方得厚聚深培而最受病處在自㓜無小學之教浸染世俗故俗根難㧞必埋頭讀書使義理浹洽變易其俗腸俗骨澄神黙坐使塵妄消散堅凝其正心正氣乃可耳余雖有豁然之見而缺此一大段功夫所幸呈露面目以來纔一提策便是原物此記作於甲寅先生進學之大槩具見於此又行狀載其自揭陽歸與呉子徃歸季思往來相與焚香兀坐坐必七日取大易七日來復之義葢先生之學專以静為主而其静也又以呈露靣目為主純是禪學由其初不知延平觀喜怒哀樂未發一語為有病而從此入門遂有旅店小樓之張皇其後焚香兀坐坐必七日皆是欲守此旅店一段光景遂執此以為學者下手工夫其講一貫也謂一貫尚是入門之學非終身結果之學即指此一段光景為一貫也其論格物也謂格物者窮理之謂也窮理者知本之謂也亦指此一段光景為知本為格物也其論性也謂陽明無善之說不足以亂性其論盡心也謂此心廣大無際常人局於形囿於氣縛於念蔽於欲故不能盡盡心則知性知性則知天曰心曰性無非指此一段光景雖未嘗廢讀書然看得這一邊重那一邊輕到後來臨終與友人書云心如太虛本無生死何幻質之足戀乎又遺疏云君恩未報願結來生全是佛家話頭其平生好處只是從天資上發出來與學問全無干渉在延平觀喜怒哀樂未發一語只是略欠自然與朱子所謂略綽提撕者稍異耳未是禪然景逸用之遂至於此甚矣學之不可絲毫有偏也原第十條基有劄記一條云髙忠憲旅店小樓忽悟明道實無一事之㫖與羅文莊初年晤老僧後攬衣流汗所見正同陳幾亭反謂髙子所見者性也文莊所見者心也文莊見後漸體認漸覺其非髙子體認既乆忽見本原一時透脫是為實悟此後惟有純熟永無走作矣又謂聖人不必有此一番不過由於正路愈行愈熟則愈識其精㣲學者必湏有此一畨按此論大非忠憲所以不及文莊正在於此文莊迷而能改忠憲即從此悟做成也幾亭又謂朱子言一旦豁然貫通觀其生平亦嘗經此段光景過來苐不欲向人道破按此則直誣朱子矣因讀先生此條檢出附此羅念庵在陽明之後深知陽明末流之弊而欲以主静功夫救之其集中有云良知固出於稟受之自然而未嘗冺滅然欲得流行𤼵見常如孩提之時必有致之之功陽明公之龍塲是也學者舍龍塲之懲創而第談晚年之熟化譬之趨萬里者不能蹈險出幽而欲從容於九達之逵豈止病躐等而已哉又與王龍溪書云終日談本體不說工夫纔拈工夫便指為外道此等處使陽明復生亦當攢睂也此皆切中當時之病然不反求之居敬窮理而第欲以主静為致恐只是致其所致非聖門所謂致髙景逸之學大抵本於念庵觀其所作三時記言在揭陽念庵之門人蕭自麓出念庵諸書觀之深嘆為陽明門人對病之藥可見至若李見羅亦深言陽明末流之弊而取止至善為宗旨只是將陽明之良知改頭換靣耳非有二也其學又在念庵景逸之下矣原第十一條基按陸王一派學問如白沙甘泉念庵諸公皆是做静時工夫得力者彼自以為學有本領即斥之者亦以偏於静非之豈知只是致其所致毫不識静時工夫耶嘗謂彼於静時要察見要尋求要捜根及至於動以為内既無私遂聽其自然流出則是静則擾之而動則任之也烏覩所謂主静立極耶程篁墩之道一編王陽明之朱子晚年定論皆以朱合陸援儒入墨使學者認集註或問為朱子中年未定之說而謂其晚歳大悟舊說之非雖有信從朱子者不能不惑於其言較之顯背紫陽其害尤甚幸羅整庵陳清瀾之徒深闢其謬如撥雲見日至徐文貞學則一書則又欲以陸合朱推墨附儒蓋以象山未嘗不曰親師友曰觀書册曰講明與朱子之格物窮理髣髴相似遂強而一之不知象山雖未嘗不言講明其視講明一邊却輕且其所講明者亦止講明其自家一派學耳非可與朱子之格物窮理同日語也謂陸無異於朱不知陸子先不知朱子推墨附儒與援儒入墨其歸一而已矣文貞平生極尊陽明良知之學而其語録有云學湏有要辨路徑路徑既明縱行之不能至猶不失日日在康莊也又曰學須有所見乃能行得如登萬仞之山必見山頭所在乃有進歩處非可㝠目求前也此亦與象山所謂講明一般原第十四條按此條問學録所載前引清瀾幾亭两段甚長後引文貞學則甚略與此不同顧涇陽學蔀通辨序以象山為有我朱子為無我其說是矣至謂朱子岐徳性問學為二不能無失而曰辨朱陸者不須辨其孰為支離孰為禪辨其孰為有我而已矣則似朱子之勝象山者僅在無我此則愚所未安原第十三條基按讀涇陽還經録其闢陽明可謂力矣然尚有未深燭其蔀處故小心齋劄記及文集内說到下手工夫終覺含糊先生日記有云辨學術同異若在經書文義上辨之則彼此膠執葛藤無已矣若舍文義而單論下手工夫則得失自見涇陽此序舍清瀾本意而别生議論誠不免躱閃余於辛丑壬寅間有告子陽明之辨謂告子不是如禪家守其空虛無用之心不管外靣只是欲守一心以為應事之本蓋即近日姚江之學然不能知言養氣則心不能應事故自覺有不得處雖覺有不得終固守其心絶不從言與氣上照管迨其久則亦不自覺有不得而㝠然悍然而己以㝠然悍然之心而應事則又為王介甫之執抝矣故告子者始乎陽明終乎介甫者也大抵陽明天資髙故但守其心亦能應事告子天資不如陽明則遂為介甫之執抝又告子天資髙強故成執抝若天資柔弱者則又為委靡矣故為陽明之學者強者必至於抝弱者必至於靡東莊見而評之曰百餘年來邪說横流生心害政釀成生民之禍真范寗所謂罪深於桀紂者雖前輩講學先生亦嘗心疑之然皆包羅和㑹而不敢直指其為非是以其障益深而其禍益烈讀此為之驚歎深幸此理之在天下終不得而磨滅亦世運陽生之一機也至謂陽明天資髙但守其心亦能應事即朱子謂禪家行得好自是其資質好非禪之力意然如朱子所稱必富鄭公吕正獻陳忠肅趙清獻諸公乃可謂之行得好耳陽明所為皆茍且僥倖不誠無物吾未見其能應事也觀其通近侍結中朝攘奪下功縱兵肆掠家門乖舛尤甚皆載在實録可攷而知也實録稱其性警敏善機械能以學術自文深中其隠矣張考夫亦極稱實録譏陽明警敏機械之言謂當時士大夫中固多有識者考夫東莊之論陽明比予更嚴予初未見實録耳所謂天資髙者有中行狂狷善人實無處可以置陽明原第三十五條考夫先生名履祥前明諸生隠居桐郷深於理學著有楊園集余於壬子五月始㑹東莊於郡城旅舍諄諄以學術人心為言曰今之人心大壞至於此極皆陽明之教之流毒也又曰涇陽景逸之學大段無不是然論心性則雖甚闢陽明而終不能脫陽明之籓籬又曰東坡學術尤誤人好其學者戲謔㳺蕩權詐茍且無所不可故人多樂而從之今之聰明才俊而决裂於亷恥之防者皆以東坡為窟穴者也若程朱之教行則人不可自便此所以惡其害己而去之朱子雜學辨最有功於世又曰今日為學當明可不可之界限古人大則以王小則以伯猶有所不可况其他乎又曰考夫雖師念臺而不盡從其學考夫之於念臺也猶朱子之於籍溪屏山白水乎非延平之比也一時之言皆有關係余所深佩服者原第三十六條魏莊渠與余子積書云文公論心學凡三變如存齋記所謂心之為物不可以形體求不可以聞見得惟存之之久則日用之間若有見焉此則少年學禪見得昭昭靈靈意思及見延平盡悟其失後會南軒始聞五峰之學以察識端倪為最初下手處未免闕却平時涵養一節工夫别南軒詩所謂惟應酬酢處特逹見本根答叔京書尾謂南軒入處精切皆謂此也中和舊說論此尤詳其後自悟其失改定已發未𤼵之論然後體用不偏動静交致其力功夫方得渾全此其終身定見也愚按朱子心學凡三變固然然惟初年渉禪其後出入於五峰之說認一日之間萬起萬滅而寂然之本體未嘗不寂然者為未發似與陽明之不分已𤼵未𤼵相類顧陽明之不分已發未𤼵者指知覺之心而言無善無惡者也朱子之不分已𤼵未𤼵者指義理之心而言萬物皆備者也故無論朱子後來分已發未發即使到底不分仍與陽明異無論陽明到底不分已𤼵未𤼵即使亦改而分仍與朱子異所以陽明雖推朱子之晚年定論而仍有影響尚疑朱仲晦之句至若劉念臺反以中和舊說為是而謂改定已𤼵未𤼵此是朱子已見得後仍用鈍根工夫可謂巧於誣朱子者矣原第九條學蔀通辨所論朱子之言三變至晚年而始定此以朱陸異同而言也魏莊渠與余子積書所論朱子之言三變在中年而已定此以朱子自家用功而言也大抵朱子四十以後初㑹象山時猶未甚冰炭其論象山處疑信相半多屬未定之見蓋縁此時識象山未破也而其自家用功則固已本末兼備確有定見矣原第十二條按右二條雖論朱子而實為異學撤其援儒入墨之蔀故附於此講良知更講致良知講理以頓悟更講事以漸修此明季諸儒所以救陽明末流之弊也然不知從朱子之格物入則所謂悟與修皆不可據不知尊程子性即理也之解則所謂理者先不真此只救得龍溪諸人之弊不曾救得陽明之弊原第六十四條以六經為聖人糟粕者猶以虛無之見置在六經外以六經為我註脚者直以虛無之見置在六經内故象山之解經其害更甚於王何也原第五十五條陽明一派學術日異而月不同正嘉之際其辭詖嘉隆之際其辭滛萬厯以後其辭邪至今日其辭遁原第五十六條楚以荀况為蘭陵令綱目特筆書之而又備載其論兵以仁義為本之言不以其言性惡而没其善所謂惡而知其美也今日於象山陽明亦當如是但從祀則不應濫及原第二十一條顔魯公唐代偉人而載於姚鉉所輯唐文粹者寶應寺有記放生池有碑深溺於浮屠之說如此其他如張說王維盧肇李華白居易柳宗元之徒連篇累牘稱揚佛教者又何足怪哉故知韓退之真人傑也唐文粹不載退之諫佛骨表大端已差原第四十七條觀聖賢李見羅曰仕止久速外别無秋陽江漢此言甚好然却未盡如喜怒哀樂子臣弟友皆是秋陽江漢又以一貫言之則一箇秋陽江漢貫萬箇秋陽江漢原増九條閱聖人百世章想親炙二字見成周風俗之厚伯夷有功焉春秋之末至於戰國柳下惠有功焉原増十條曾㸃之春風沂水即子思之鳶飛魚躍蓋以道極於至大而無外入於至小而無間隨時隨地隨人皆有當然之理有一毫欠缺便非所以報知己髙明廣大處有一毫欠缺則大綱便不正精㣲中庸處有一毫欠缺則萬目便不舉此即伊尹一夫不獲時予之辜意思故謂其有堯舜氣象但㸃只是見得未能行得若三子之沾沾於兵農禮樂視㸃之所見狹且粗矣然却是實能行得漆雕開所謂斯即是㸃所見之境界但自知其未能信則其篤志處亦髙於㸃原第二十四條漆雕開吾斯之未能信一語意味深長蓋大綱之信猶易節目之信最難知處信猶易行處信最難順處信猶易逆處信最難從容時信猶易倉卒時信最難開雖己見大意而能體認到此其一段謙退精進氣象真是可恱如陳清瀾學蔀通辨亦可謂己見大意却少此一段氣象原第二十五條史記檀弓皆載孔子負杖逍遥歌泰山梁木之事呉草廬曰此妄也聖人徳容始終如一至死不變今負手曳杖逍遥於門動容周旋中禮者不如是也聖人樂天知命視死生如晝夜豈自為歌詩以悲其死且以哲人為稱又以泰山梁木為比若他人悲聖人之將死而為此歌詞則可聖人自為此歌而自比乃若是妄也蓋是周末七十子以後之人譔造欲表聖人之豫知其死將以尊聖人而不知適以卑之也草廬此論言聖人生死之際甚明白若如史記檀弓所載則孔子之臨没不如曾子之啓手足易簀逺矣按譔造聖人事欲尊聖人而適以卑之者多矣在漢論衡諸書已辨之若草廬此論所見更卓宜先生深取之也二程先生一寛和一嚴厲明道嘗謂伊川曰異日能使人尊嚴師道者吾弟也若接引後學隨人材而成就之則予不得讓焉朱公掞見明道於汝州歸告人曰光庭在春風中坐了一月游定夫楊中立見伊川一日先生坐而瞑目二子立侍不敢去退則門外雪深尺餘矣明道每與門人講論有不合者則曰更有商量伊川則直曰不然二先生氣象不同如此然不可以此遽議優劣寛和有寛和好處嚴厲有嚴厲好處至以其立朝言之明道能使荆公服其忠信而伊川不能使子瞻不詆為姦險亦非二程之有優劣蓋荆公尚能容明道而子瞻不能容伊川也至以其論學言之語録中明道言居敬處多伊川言窮理處多如以記誦博識為玩物喪志如曰有天徳便可語王道其要只在慎獨如曰學只要鞭辟近裏着已質美者明得盡渣滓便渾化却與天地同體其次惟莊敬持養曰學者須先識仁仁者渾然與物同體識得此理以誠敬存之而已則皆明道之言也如曰涵養湏用敬進學則在致知曰今日格一件明日又格一件則皆伊川之言也故近世談良知者多喜言明道而抑伊川不知二先生之學一也窮理居敬必無偏廢之理特記之者有詳略耳伊川嘗謂張繹曰我昔狀明道先生之行我之道葢與明道同異時欲知我者求之於此文可也此程門定論也故二程語録中多有不分二先生語者後人奈何以己意而妄分優劣乎論二先生者亦折衷於朱子而已朱子曰明道語宏大伊川語親切又曰明道渾然天成不煩人力伊川工夫造極可奪天巧又曰明道可比顔子若孟子才高恐伊川未到孟子處伊川收束檢制孟子却不能到又曰大程當識其明快中和處小程當識其初年之嚴毅晚年又濟以寛平處又曰明道說話超邁不如伊川說得的確合朱子數條觀之則知明道天資高於伊川伊川學力所至不讓明道明道有優於伊川處伊川有優於明道處然其道則一而已故四書集註引用二程語亦不分伊川明道原第四十一條按問學録所載奈何以己意而妄分優劣乎下云必欲分焉則有之矣此改云亦折衷於朱子又伊川有優於明道處以下問學録内無明道謝表有云惟知直道以事君豈忍曲學而阿世及為御史對神宗曰使臣拾遺補闕禆贊朝廷則可使臣掇拾臣下短長以沽直名則不能嗚呼此所謂濂洛關閩之清議而非顧厨俊及之清議也以此為訓猶有摘蘇子瞻䇿問而劾其不恭如朱光庭者原第四十二條黄勉齋所述朱子行狀直是一篇太極圖學者不可不讀原第二十二條基按日記云朱子行狀是周子一篇太極圖周子太極圖即是朱子一篇行狀湏知只是恰好二字太極圖純是畫一理字朱子行狀是畫一當理様子朱子諸封事人但見其一味正直然其中仍有一段忠厚和平之意在蓋由其從義理發出非從意氣𤼵出也原第二十三條基按讀先生奏疏亦湏知此意果齋李氏謂朱子晚見諸生繳繞於文義之間深慮斯道之無傳始頗指示本體使深思而自得之此似與陽明朱子晚年定論之說相符然所謂指示本體者亦示之以體用兼備之學耳豈教之以尊徳性而廢問學乎豈教之守其昭昭靈靈者為尊徳性乎原第四十三條基有劄記一條云朱子文集答張敬夫書曰來教謂静則溺於虛無此固所當深慮若以天理觀之動之不能無静猶静之不能無動静之不能無養猶動之不能無察也但見得一動一静互為其根敬義夾持不容間斷之意則雖下静字原非死物至静之中蓋有動之端焉固非遺事絶物閉目兀坐之謂但未接物時便有敬以主乎其中則事至物來善端昭著而所以察之者益精明爾按此段真是說得四平八穏後人謂朱子不喜言静不呌人涵養本原上做工夫詎知惟朱子纔是真能静纔是真能涵養本原纔有合於體用一原動静無端之旨又一條云朱子之學真箇是體用一源顯㣲無間知行皆是如此後讀黄勉齋集鄂州四賢堂記云新安朱先生禀資髙明厲志剛毅深潛黙識篤信力行體用一源顯㣲無間之㫖超然獨悟頗以自信因先生體用兼備語附志於此元史載劉静修初為經學究訓詁疏釋之説輒嘆曰聖人精義殆不止此及得周程張邵朱吕之書一見能發其㣲曰我固謂其當有是也又曰邵至大也周至精也程至正也朱子極其大盡其精而貫之以正也今静修集中叙學一篇不及朱子想是其早年之作其次第亦不如程氏分年日程之詳然其謂六經自火於秦傳註於漢疏釋於唐議論於宋議論之學自傳注疏釋出故必先傳注而後疏釋先疏釋而後議論此是不易之論原第六十二條孔子集羣聖之大成朱子集諸儒之大成猶文武周公損益二代之制以成一王之法也孔子傷夏殷之禮不足徴葢惜文武周公損益之妙不得見於後世耳今孔子之道雖垂於六經而其所以損益羣聖者後世亦不能知其詳獨朱子云今未逺遺文具在其所述諸經之傳註既足以明道於天下而其損益之妙又往往見於文集語類之中學者其可不寳而傳焉章楓山謂朱子語類一書雖出門人所記不敢謂其字字句句皆無差誤而其中所載大而天地鬼神之奥小而一事一物之宜凡所以窮理修身應事接物與夫治國平天下之道靡所不備大有功於後學信哉薛文清謂讀朱子語録雜書斷不若讀其手筆之書然手筆之書亦有得語録而益明者文清特恐人不知採擇而為此言耳原第三十三條按問學録本三條此合為一朱子精意每每見於語類楓山之言極是先生所以謂得語類而益明也嘗讀陳剩夫先生集與周翠渠書云朱子程子遺書序曰伊川先生無恙時門人尹焞以是書奉質先生曰某在何必讀此書若不得某之心所記者徒彼意耳以是觀之今語類既皆門人所退録則朱門諸賢豈盡過於㳺揚吕謝諸公之學而所得豈盡得朱子之心哉然則讀語録正當有所折衷未可以為無毫釐之差謬也殆亦文清之意又曰規模間架在吾胸中然後讀語類以填補之使道理益充周浹洽甚宜也若其未然恐當循序蓋文清及剩夫皆以朱子手筆之書為主循序讀書之法固然然某嘗與廬陵王公勉軒論語録王至謂更粹於文集疑朱子自加刪定此言亦非臆度蓋文集尚有少壯未定之論而語類中純者居多也竊謂學者不可不細加體㑹不可因文清剩夫之言而忽之吾邑前輩沈晴峰論清任和之義曰昔在孟子時伯夷伊尹柳下惠三聖之名與孔子鼎立未有標别而獨尊吾孔子也者惟孟子始見孔子之大為此區别之論伯夷擔負綱常砥樹名節一讓而父子兄弟之道立一諌而君臣冠履之防明後來如季札嚴光文天祥之流似之然世路淆雜利害相攻使人人遜讓以不犯手為髙大事大變倚靠誰人故伊尹一任而伐夏救民再任而放桐復辟後世如霍光諸葛亮之流似之然自世之衰也非復三五之時公道半明晦人羣半真偽故人情事變亦半起半仆任之不能清之不得則湏耐性柔情徐量其機解紛調劑救之者半隨之者半要以濟事安人故柳下惠者未嘗不清不必激而表其清未嘗不任不必任而處之過曹參丙吉謝安王旦之流似之人生處世只此三條大路孔子酌於三者之中幾㣲中節譬之大醫用藥仍是衆工所用者觔兩之不同耳譬僚之於丸庖丁之於牛丈人之於承蜩輪扁之於斵輪皆妙在手法輕重疾徐之間此論清任和之義精矣然清任和與為我兼愛執中又何以别愚謂清者無我與為我不同任者有差等之愛與兼愛不同和者調劑於清任之間執中者膠執於為我兼愛之中故夷尹惠與孔子偏全之分也異而同者也楊墨子莫與孔子邪正之分也直為異端而已然則季札諸葛亮謝安王旦之流亦可為聖乎曰是皆君子善人中行狂狷之徒也蓋君子善人中行狂狷之内又各自有清任和之不同原第三十六條綱目不載嚴光足加帝腹之事欲學者取其髙而不取其傲也讀淵明詩者不可不存此意原第六十一條基按文集内有活潑潑齋記言王君天市有南窗寄傲扁額先生為改題之因極論傲字之病與此條相𤼵包孝肅海忠介可謂不忮不求何用不臧矣却不免有子路終身誦之之意沾沾以是道為臧便不足為臧近世鹿江村孫徴君皆是這一路人惜無聖人裁成之所以其成又不若子路子路若不是聖人裁成其病痛亦不止此原第五十九條按江村諱善繼字伯順大名人徴君諱竒逢字鍾元前明孝亷容城人皆以理學名松陽鈔存卷下
