body:
  text: 松陽鈔存卷上贈内閣學士陸隴其撰道體仁義禮智各有體用而以其流行之序言之仁初發出只是一㸃萌芽及其盛則為義及其成則為禮既成而藏則為知孟子所以指仁為人心義為人路其實仁義禮知皆在心𤼵岀來皆是路原第五條後學楊開基按朱子云仁固為體義固為用然仁義各有體用各有動静又曰以仁存於心義形於外言則以仁義相為體用若以仁對惻隠義對羞惡言則就一理之中又以未發已𤼵相為體用先生此條闡朱子意極明唐以前儒者皆以愛言仁自程子曰偏言則一事專言則包四者而人始知愛不足以言仁自程子之後儒者又多離愛言仁自朱子曰仁者心之徳愛之理而人又知仁非即愛亦不離愛仁是未𤼵之愛愛是已𤼵之仁言仁之說於是始精然不讀朱子仁說及語類所記論仁各條亦不知程朱用心之苦原第四十條按此較問學録節去數句崑山諸莊甫論仁義禮智信最好曰仁義禮智信雖作五件其實是一時俱有的但要識得那一件為政耳如有時仁為政仁主於慈愛而慈愛莫切於子愛而教誨之仁之義也愛而有節文仁之禮也愛而知其惡仁之智也愛而有始有終仁之信也四者缺一則非仁矣如有時禮為政禮主於尊敬而尊敬莫大於君敬而忠愛之禮之仁也敬而裁制之禮之義也敬而每事先見禮之智也敬而終身不易禮之信也四者缺一則非禮矣推之義智信莫不皆然先儒所謂理一而分殊也莊甫此一條蓋即十二律旋相為宫之意醫家君臣佐使亦然原第二十八條莊甫名士儼隠居嘉定基按性理大全或問性之四端迭為賔主恭而無禮是以禮為主也義以為質是以義為主也蓋四徳未嘗相離遇事則層見迭出朱子曰說得是此疑莊甫所本也然却𤼵得甚明宜先生深取之也周子太極圖全是知天命之學原第五十條按儀封所刋本無之學二字陸桴亭謂一本萬殊猶言有一本然後有萬殊是一串說下理一分殊猶言理則一而分則殊是分别說開譬之於水一本萬殊者如黄河之水出於一源而分出千條萬派皆河水也理一分殊者如止是一水而江河湖海自不同也其說極明但桴亭以理一分殊解一貫愚却未敢以為然一貫是一本萬殊不是理一分殊原第二十九條桴亭名世儀字道威嘉定人明季諸生研精理學著有思辨録諸書基按先生日記云羅文莊日理一分殊本程子論西銘之言推之天下之理無所不盡持此以論性自不須立天命氣質之兩名文莊尊理一分殊之語可也而便欲以此破除天命氣質之名則非矣但知理氣之合而不知理氣之分可乎此條亦學者所當知故附於此按文莊困知記内論理一分殊津津乎言之然却與朱子不合當辨程子言在物為理處物為義又云性即理也言性即理則義在其中矣仁義禮智皆義也天命之性也達徳也父子有親君臣有義夫婦有别長㓜有序朋友有信則理也率性之道也達道也合而言之則理而已矣朱子大學或問云心雖主乎一身而其體之虛靈足以管乎天下之理理雖散在萬物而其用之微妙實不外乎一人之心心管乎天下之理者也非即理也原第五十八條禮樂二者相為表裏論語曰禮之用和為貴是禮中之樂周禮以樂徳教國子中和祇庸孝友曰中以無相奪倫言曰祗以肅然起敬言是樂中之禮原増六條為學左傳載周原伯魯不說學魯閔子馬曰周其亂乎夫必多有是說而後及其大人大人患失而惑又曰可以無學無學不害不害而不學則茍而可於是乎下陵上替能無亂乎原伯之不說學不知其意如何大抵當時老子有聖人不死大盗不止之說浸滛於士大夫之耳原伯亦尤而效之者也大人身居髙位不能不患失患失不能不回惑所頼以維持啟廸之者學耳今曰可以無學則何所不至乎自此說行而文武典章將弁髦視之茍且之風成而大亂之兆見矣閔子馬之言亦猶辛有伊川之歎也嵇阮之清談盛而永嘉之亂興姚江之良知熾而啟禎之禍作皆是如此彼豈徒不說學方且侈然自以為善學而笑聖賢之不知學原第十五條考亭淵源録載郭友仁徳元告行朱子曰人若於日間閒言語省得一兩句閒人客省得一兩人也濟事若渾身都在閙塲中如何用工人若逐日無事有見成飯喫用半日静坐半日讀書如此一二年何患不進愚按徳元曾學禪此語係徳元所記恐失其真觀朱子答劉淳叟曰某舊見李先生嘗教令静坐後來看得不然只是一箇敬字好方無事時敬於自持及應事時敬於應事讀書時敬於讀書便自然該貫動静心無時不存又答潘子善云所論為學之意善矣然欲專務静坐又恐墮落那一邊去只是虛着此心隨動隨静無時無處不致其戒謹恐懼之力則自然主宰分明義理昭著矣然著箇戒慎恐懼四字已是壓得重了要之只是略綽提撕令自省覺便是工夫也可見朱子未嘗教人靜坐况限定半日哉愚故謂徳元所記恐失其真幾亭陳氏以此二語為朱子教人之法誤矣或疑伊川見人静坐便嘆其善學載於近思録第四卷中朱子於復卦象註曰安静以養微陽也是言初動之時宜静也於咸卦初爻註曰此卦雖主於感然六爻皆宜静而不宜動也是言方動之際宜静也於太極圖註曰聖人全動静之徳而常本之於静是言未動之先宜静也程朱何嘗不言静不知程朱固未嘗不言静而未嘗限定半日且其所謂静者皆是指敬非如學禪者之静又恐敬之混入於禪也而申言之曰略綽提撕夫敬猶恐其有病也而况專言静乎原第一條基按此條極有關係但謂朱子語類一條為徳元所記想先生祗據淵源録未及細考耳查語類乃沈莊仲僴所記然看朱子訓沈僴諸條則莊仲初曾為永嘉之學者又一條云今公雖曰知為學然却放得逺少間㑹失心去玩失心二字則莊仲又似為金溪之學者又一條訓以善讀書之法與友仁同則此語誠恐失其真也先生此條定為學術稍偏者所不樂聞基懼或借誤莊仲為徳元以藉口故附辨於此按先生文集亦載此條但無答潘子善一段後靣略綽提撕句似無根宜以此為正大學言八條目而戒慎恐懼貫乎其中中庸言戒慎恐懼而八條目貫乎其中原增三條基向有劄記一條云戒懼慎獨是大學誠意正心工夫不言格致者已包在戒懼中也羅整庵先生欲以首節指㸃性道教當格致偏矣近思録小序云存養之功實貫乎知行可知戒懼慎獨該得格致在内胡敬齋亦云致知力行皆靠住戒慎做去廬陵王勉軒見而極取之批曰戒懼中本包有格致工夫異端之所以藉口者皆舉中庸首章不用格致工夫為詞此金溪黒腰子所由來也掲出此條快極快極有功後學不小按勉軒不免過譽然似與先生此條有發明處故附於此李厚庵言知行工夫有三様小學則先行後知大學則先知後行成徳則又先行後知愚謂聖賢之言知行有分先後言者有不分先後言者如子思云尊徳性道問學程子云涵養須用敬進學則在致知皆不可分先後然却又不是王陽明知行合一之謂原増四條厚庵名光地庚戍進士安溪人大學士諡文貞朱子白鹿洞學規無誠意正心之目而以處事接物易之其𤼵明大學之意可謂深切著明矣蓋所謂誠意正心者非外事物而為誠正亦就處事接物之際而誠之正之焉耳故傳釋至善而以仁敬孝慈信為目仁敬孝慈信皆因處事接物而見者也聖賢千言萬語欲人之心意範圍於義理之中而已而義理不離事物明乎白鹿洞學規之意而凡陽儒隂釋之學可不待辨而明朱子答陳膚仲書云所謂涵養工夫非是閉睂合眼如土偶人然後謂之涵養也只要應事接物處之不失此心各得其理而已亦即學規之意原第二條基按文集亦載此條但答陳膚仲以下則云夫子告顔子克己復禮而以視聽言動實之其即朱子之意也夫似不若此條之明透可見鈔存為定本耳存心養性朱子不分作二事謂存得父子之心盡方養得仁之性存得君臣之心盡方養得義之性潛室陳氏亦曰存心即誠意正心之謂養性在其中矣非存心外别有所謂養性工夫愚謂中庸言尊徳性而朱子以存心解之亦此意也如分存心養性為二事則尊徳性與存心亦二事矣蓋止此操存之功就心言之則謂之存就性言之則謂之養謂之尊豈有二耶但孟子言存養在知性之後包小大而言與中庸第二十七章之存心專以道體之大言者不同孟子言存養包省察在其中與中庸首章之存養以省察對言者不同至於中庸言未𤼵已𤼵則又就此心分出動静虞書言人心道心則又就此心分出公私其言各異而存心養性無二事則一也若異學之存心只存得箇人心便難與養性為一原第三條天地位萬物育猶云大綱正萬目舉能致中則天下大綱都好了是謂天地位能致和則事事都好是謂萬物育致中而天地位也有許多作用不是空空守此未𤼵之中天地便位大抵中和雖分一體一用然中又自有中之體用和又自有和之體用中庸後邊言大徳小徳言尊徳性道問學皆是如此論語敬信節用愛人時使註云此特論其所存未及為政也亦不是謂此五者只空空一心絶無事實亦是大綱好只筭得在心上到萬目俱好方纔是為政原第四條大程云極髙明而道中庸非二事中庸乃髙明之極此與居敬行簡克己復禮閑邪存誠一例朱子皆分為兩截程子皆合為一事非相悖也程子自其合者言之朱子自其分者言之正相𤼵明若象山陽明亦皆欲合為一事其意便不同譬諸修屋程子止言修屋則修墻在其中蓋墻即屋之墻恐人認為二物也朱子則言修屋又言修墻恐人只知屋忘却墻也言雖不同其實一也若象山陽明則只要修屋不要修墻原第三十一條尊徳性而道問學章句以存心致知分屬之史氏伯璿疑其缺力行意欲以盡精微知新屬致知道中庸崇禮屬力行蔡虛齋深取之然朱子之意殊不然語類有一條云致知敬克己此三事以一家譬之敬是守門戶之人克己則是拒盜致知却是去推察伊川言涵養須用敬進學則在致知不言克己蓋敬勝百邪便自有克如誠則便不消言閑邪之意猶善守門户則與拒盜便是一等事不消更言别有拒盜底若以涵養對克己言之則各作一事亦可此程端蒙所記又一條問尊徳性而道問學行意在先擇善而固執知意又在先如何曰此便是互相為用處此陳淳所記朱子分明以尊徳性存心包力行史氏蔡氏豈未之考耶又林䕫孫所記論顔冉之學一條云坤是箇無頭的乾爻皆變而之坤其辭曰見羣龍無首吉乾便從知處說起故云知至至之知終終之坤只是從持守處說故云敬以直内義以方外克己復禮也是有知底工夫在前主敬行恕只是據見在依本分做將去玩此則知聖賢論學固有從力行說起者但不是專務力行而不致知做坤道工夫仍不廢乾道所以言尊徳性即言道問學不必以行先於知為疑或云此章尊徳性是極乎道體之大道問學是盡乎道體之小豈力行則專務其大致知則專務其小歟是又不然知在行先者固無分大小皆須理㑹知在行後者大綱已不差了只是要詳求其節目篁墩程氏曰尊徳性者制外養中而道問學則求其制外養中之詳尊徳性者由中應外而道問學則求其由中應外之節此說得甚好原第三十二條基按尊道分屬存心致知自來聚訟得先生之論始見廬山真靣一隅集松陽講義既出已足盡破羣疑矣但松陽講義兼存致知内亦可包得力行之說論理固圓然在本節斷以存心包致知為定論讀此條自明問學録一條云讀書記謂博文乃道問學之事是欲盡知天下事物之理約禮乃尊徳性之事是欲常常存吾心固有之理玩此則二句即是程子涵養湏用敬進學則在致知之意然看來約禮即是克己復禮也克己復禮是力行之意與涵養用敬之意稍别所以看作一事者蓋朱子論涵養用敬二句原將克己補在敬一邊也克己復禮少不得以敬為主則以約禮作尊徳性看自妙按此條與此相發克己一己字最可怕這箇己生於氣質成於習染為意必固我為克伐怨欲入於視聽言動則為非禮入於喜怒哀樂則為乖戾入於子臣弟友仕止乆速禮樂刑政到處成病痛大綱不正萬目不舉皆是這箇作怪能急能緩能剛能柔能顯能隠千態萬狀雖各有輕重淺深之分數不同然有了一分便障了一分義理書之所謂人心惟危聖人江漢以濯秋陽以暴只是能將這箇去得浄盡無處容畱自聖人以下皆是以這箇去畱之分數為人品之髙下原第二十六條人有剛柔清濁之氣稟行於酒色財氣之人欲上二者各有輕重淺深之分數故人品不齊須以義理克之理義亦不離乎酒色財氣却不雜乎酒色財氣亦有輕重淺深分數原増第八條立後之權有數等有不惑之權有知夭命之權有不思不勉之權下學而上達亦然原第四十九條張子西銘從孟子盡心一章來原増第二條基按先賢謂西銘理一而分殊是發明前半篇先生此語是𤼵明後半篇蓋窮神知化便是盡心知性知天無忝匪懈便是存心養性而厚生玉成以至存順殁寜并殀壽修身以俟俱在裏必窮十三經必閱注疏大全必究性理必覽朱子文集語類必觀通鑑綱目文獻通考必讀文章正宗得無詩人所謂田甫田乎曰此學者之本務也非甫田也但亦當循序而漸進易曰寛以居之程氏分年讀書日程一編真可為學者準繩原第四十八條四書五經性理大全雖纂輯之臣如胡楊金蕭無大儒在其間故不無繁冗遺漏之病而大義炳如非程朱之學不載足為學者準繩蓋當時承宋元諸儒理學大明之後黒白昭然不必登堂入室之士然後能知聖人之道永樂之政未有善於此時者也自成𢎞以上學術一而風俗同豈非其明效耶原第六十三條吕氏云儒者正學自朱子没勉齋漢卿僅足自守不能發皇恢張再傳盡失其㫖如何王金許之徒皆潛畔師說不止呉澄一人也自是講章之派日繁月盛而儒者之學遂亡永樂閒纂修四書大全一時學者為成祖殺戮殆盡僅存胡廣楊榮輩茍且庸鄙之夫主其事故所摭掇多與傳注相繆戾甚有非朱子語而誣入之者蓋襲通義之誤而莫知正也自餘䝉引存疑淺說諸書紛然雜出拘牽附㑹破碎支離其得者無以逾乎訓詁之精其失者益以滋後世之惑上無以承程朱之㫖下適足為異端之所笑故余謂講章之道不息孔孟之道不著也腐爛陳陳人心厭惡良知家挾異端之術起而决其樊籬聰明向上之士翕然歸之隆萬以後遂以背攻朱註為事而禍害有不忍言者識者歸咎於禪學而不知致禪學者之為講章也愚謂吕氏惡禪學而追咎於何王金許以及明初諸儒乃春秋責備賢者之義亦㧞本塞源之論也然諸儒之拘牽附㑹破碎支離潛背師說者誠有之而其𤼵明程朱之理以開示來學者亦不少矣使朱子没後非諸儒則其樊籬不至隆萬而始裂而今之欲闢邪崇正者豈不愈難也哉故君子於諸儒但當擇其精而去其粗無惑於拘牽附㑹破碎支離之說而不没其守先待後之功則正學之明其庻幾焉原第三十四條基按先生此論極得朱子家法若如吕氏說則朱子當日只消守程子之說又何必纂精義纂輯略羅吕謝游楊之論别為或問以剖析之乎擇其精而去其粗無惑於拘牽破碎不没其守先待後之功先生真繩尺朱子也朱子謂易之取象固必有所自來顧今不可復考且從象以下説此與不敢輕言春秋之例同一闕疑之法蓋朱子解經有極放膽處有極小心處然放膽處亦從小心處來原第五十三條朱子於易則取先天圖取河圖洛書於詩則黜小序於大學則不用古本於孝經則作刋誤此皆有旋乾轉坤之力與湯武撥亂反正同功然有朱子之學則可無朱子之學則妄也明儒往往欲舍朱子而自立門户其髙者則管夷吾之内政軍令其卑者則商鞅之决裂阡陌而已原第五十二條基按先生雅不喜學者輕易改易經傳謂南巢牧野止可讓湯武一行不宜於程朱後再議更張故於草廬諸書俱有所不滿為此也仁山先生定洪範經傳可謂停當而先生於詹某洪範河洛諸解質疑猶曰仁山議論不可不存於天地間但應將不宜輕改之意著於篇末庻有以擴學者之胸襟而不開其弊蓋先生之防㣲杜漸謹守朱子家法如此大學二程皆有改正本至朱子始分為經傳復補格物致知之傳其說精矣而後儒紛紛如董文靖公槐則謂傳未嘗缺特簡編錯亂欲歸經文知止以下至則近道矣以下四十二字於聽訟吾猶人也之右為傳之第四章以釋致知格物方希古蔡虚齋皆是之至王陽明則又以戴記原本為孔門古本而曰大學止為一篇原無經傳之分格致本於誠意原無缺傳可補自嘉隆以來為良知之學者皆主之髙景逸名尊朱子而亦以古本為是以不分經傳為是不可解也自古本之外復有石經大學出自近世編次又與古本異鄭端簡極信其書陳幾亭曰是豐坊偽作蓋以坊言得之某塜中也此書誤人尤不淺學者只斷以朱子所考訂者為正而凡移經作傳及不分經傳者皆不可從吕氏謂大學經程朱考定如地平天成即與鴻荒時境界有不盡合分外分明停當萬世永頼後來紛紛動援古本石經狡焉思逞都是無知妄作可謂確論原第十六條豐坊不但作偽大學又作偽詩傳山東王西樵有偽詩傳論略云近世所傳子貢詩傳申公詩說皆偽也明有鄞人豐道生好譔偽書自言其家有魯詩世學一書傳自逺祖稷實自譔也又作詩傳託之子貢以為張本而所謂世學者若相與發明尋有妄人依旁詩傳别譔詩說其體類小序其說與豐氏盡同惟篇次小異道生叙詩傳源流又詭其所從出云魏正始中虞喜奉詔摹石而宋王子韶開河得之其說最支離而同時諸公無覺之者郭子章刻之於楚李維楨為序亦不一致疑惟道生同郡周應賔者著九經考異辨之特詳然㣲周氏其偽亦灼然也凡古書源流存亡真贋漢藝文隋經籍降及鄭通志馬通考諸書可覆而按也漢書儒林叙諸家授受尤悉竝無一言及子貢詩傳者考虞喜傳亦無奉詔書石經事獨申公為魯詩漢志魯故二十五卷說二十八卷隋志明言亡於西晉安得至今猶存耶此書本不足以欺後世而姚氏詩疑問引傳說與序等遂若詩傳果出子貢之手者按西樵此論最有功於詩汪鈍庵作西樵傳特載此論亦最有見原第十七條西樵名士禄順治壬辰進士官考功郎鈍庵名琬呉人順治乙未進士康熈己未鴻博官翰林家語一書亂於後人之手又未經程朱大儒論正是以愈傳愈亂餘冬敘録謂考漢書藝文志載家語二十七卷顔師古曰非今所有家語也唐書藝文志有王肅注家語十卷此則師古所謂今之家語者歟今世相傳家語殆又非肅本非師古所謂今之所有者所以知之者蓋司馬貞與師古同代人也貞作史記索隠引及家語今本或有或無有亦不同可知其非肅之全書矣史記傳顔何字冉索隠云家語字稱仁山金氏考七十二子姓氏以顔何不載於家語論語問子桑伯子朱注云家語記伯子不衣冠而處張存中取說苑中語為証蓋金張二人所見已是今本今家語元王廣謀所注本也顔何伯子事廣謀本所無者以餘冬叙録觀之則朱子猶及見家語王肅本而今亡矣王守溪震澤長語云於書市中得家語王肅註閱之則今本所無多具焉是王肅本尚存然未知守溪所見果肅本否譚梁生以伯子事見說苑不見家語而議朱注之疎殆未考家語之始末也亦可為讀書輕議古人者之戒原第三十九條春秋公羊言襄公二十一年十有一月庚子孔子生榖梁則書庚子於十月之後以此年十月庚辰朔考之則十一月無庚子庚子乃十月二十一日也榖梁是而公羊非周十月今八月是孔子生日為八月二十一日無疑也然以史記考之則孔子之生乃在襄公二十二年杜預亦主之朱子論語序說用史記生年而序公羊月日於下於是說者自二十一年十月庚辰朔推之除朔虛六日則以二十二年十月二十七日庚子為孔子生日實今之八月二十七日也二說未詳孰是吳氏程則又取索隠之說謂史記以周正十一月為屬明年故誤而朱子因之然索隠亦是臆說非有所據大抵以為二十一日則是己酉歳生七十四年以為二十七日則是庚戍嵗生七十三年學者疑則傳疑可也必欲強而定之則鑿矣原第四十六條處事正直忠厚處世之道只此二端所難得恰好者分寸耳不講分寸而各持一說則二者皆必弊之道也矜而争羣而黨正是正直忠厚之無分寸者雖如韓魏公之不欲分别黑白顧涇陽之自謂吾輩持濓洛關閩之清議不持顧厨俊及之清議皆不免有弊士君子處世當先正其本曠然無我而惟以天下國家為念其積誠已足風世而其語黙剛柔之節則又因乎其時所謂邦有道危言危行也因乎其交所謂信而後諫也因乎其地所謂不在其位不謀其政也賢否不可不辨而不宜處之以刻使之無地自容也是非不可不白而不宜或傷於訐使之窮而思逞也憂時之心彌篤而能漸以導之抗節之意彌堅而能婉以出之不為西京之頑鈍亦不為東京之矯激此所謂君子而時中此所謂君子義以為質禮以行之孫以出之信以成之其庻幾乎然尚書有直寛剛簡之教則人之不能皆中也唐虞時已然是又頼在上之君子主持而化裁之取其長而導其偏使君子之忠厚者不病於正直正直者不病於忠厚則東西京末流之禍不見於天下而唐虞之治可幾原第十九條顧涇陽告王荆石曰以模稜為工以調停為辨遇賢否不欲分明别白混而納之於平等而曰吾能剖破藩籬遇是非不肯直截擔當漫而付之於含糊而曰吾能脫落意見乆之正氣日消清議日㣲士習日巧宦機日滑此正孔子所謂徳之賊孟子所謂衆皆悦之自以為是而不可與入堯舜之道者也三代而下髙官大禄大率此一路人居多此是忠厚之假者張侗初渙羣論曰易稱渙小羣以成大羣大羣羣也小羣黨也大羣為君子而小羣則雖有君子之名行君子之事而其流必中於小人之無忌憚何也以有小人為之借也君子一有偏則不肖之人遂窺所嚮而托足焉獵名者託其芳負詬者營其窟憤盈者張其勢毒螫者假其燄荆棘載道風波瀰天始於立氣節而竟収占風轉舵之人始於明學術而竟引塗靣䘮心之軰此是正直之假者假忠厚假正直又不可與無分寸之正直忠厚同論原第二十條按右二條問學録本一條此分為二而語亦節得簡明人生處處要樹立一界限事事要斟酌一分寸原六十條基按朱子每好言恰好二字先生此二語亦只是要恰好又此二語省察克治都在裏人無逺慮不但是溺於宴安耽於嗜欲如虛無寂滅記誦詞章之徒皆是不知逺慮逺慮不是從利害起見只是歩歩循天理原第五十一條史傳成湯解網一事此非特言湯之恩及禽獸乃商家一代用法之權衡也大抵先王立法止存其大綱而不能必天下之毫釐不差故商道號尚嚴然未嘗不時開其一靣此所以法行而天下安之若夫立法而必天下之毫釐不差此商鞅韓非之所謂法而豈先王之法哉余在嘉定時體認得如此宋史仁宗贊曰四十二年之間吏治若媮惰而任事蔑殘刻之人刑法似縱弛而決獄多平允之士國未嘗無嬖倖而不足以累治世之體朝未嘗無小人而不足以勝善類之氣仁宗可謂得商湯解網遺意漢卓茂謂律設大法禮順人情其意亦猶是原第三十條基按先生治邑以清廉著聲者也而其論治體如此所以民沾其恵至今稱道弗衰也蓋王道與管商只此毫釐之辨世之號為清亷而以刻核為治者尚其三復於斯馬貴與云周禮雖似煩擾而不見其為法之弊者蓋以私土子民痛癢常相關而良法可世守自封建變為郡縣壤土既廣則志慮有不能周長吏數易則設施有不及竟於是法立而姦生令下而詐起處以簡静猶或庻幾稍渉繁夥不勝其瀆亂矣此是至言然簡湏要有分寸若簡無分寸便是太簡欲有分寸湏是主敬窮理原增第一條一篇洪範只是要叙彛倫然非九疇咸備彛倫不可叙不是區區司徒一官可以叙得所以孟子言敎必先言養原第六十六條東方朔曰水至清則無魚人至察則無徒冕而前旒所以蔽明黈纊充耳所以塞聰明有所不見聰有所不聞此舉大徳赦小過無求備於一人之義也枉而直之使自得之優而柔之使自求之揆而度之使自索之此數語不善用之則為柳下之不恭又甚則為東方朔之玩世為胡廣之中庸為蘇味道之模稜善用之即寛則得衆之道也其不同處只在分寸上又在時候上如何能恰中其分寸恰中其時候只是主敬窮理晉伯宗曰川澤納汙山藪藏疾瑾瑜匿瑕國君含垢路溫舒上徳緩刑書亦引用此語皆與東方朔同意皆要講分寸看時候原第六十八條孔子於魯獵較可從而女樂必行者一則是由剥而復之機一則是由復而剥之機也聖人之審幾精矣語類曰天下無道譬如天之將夜雖未甚暗然自此只向暗去知其後來必不可支持故亦湏見幾而作正此之謂然聖賢見幾雖決而用心則甚厚故孔子以微罪行伯淳之詩曰未湏愁日暮天際乍輕隂原第四十四條基按問學録内少聖賢見幾一段必如此方形容得聖賢出處之心若但曰見幾而作猶只見得一半讀陽明奏㨗疏平八寨詩不如曹彬下江南歸朝氣象逺矣原增第五條基按陽明文集正徳十二年五月有閩廣㨗音疏十二月有横水桶岡㨗音疏十三年四月有浰頭㨗音疏六月有三省夾勦㨗音疏十四年有江西㨗音疏及擒獲宸濠㨗音疏十五年重上江西㨗音疏嘉靖七年有八寨斷滕峽㨗音疏凡八疏未知先生指何篇言抑以其槩不免誇張功效耶平八寨詩云見說韓公破此蠻貔貅十萬騎連山而今止用三千卒遂爾収功一日間豈是人謀能妙筭偶逢天助及師旋窮搜極討非長計湏有恩威化梗頑誠與曹武惠奉敕江南勾當回氣象殊矣兒寛帶經而鉏為左内史推情與下不求名聲以負租課殿當免民聞當免皆恐失之大家牛車小家擔負輸租繈屬不絶課更以最可謂有真儒循吏之風矣及天子以司馬相如封禪書問寛寛對曰封泰山禪梁父帝王之盛節也然享薦之義不著於經非羣臣之所能列唯天子建中和之極兼總條貫金聲而玉振之是何言歟亦異於宋孫奭天書之對矣漢書以寛與公孫𢎞卜式同傳有以也夫原第六十七條何椒丘云自道學不明士名一善而不克終者多矣昔胡邦衡論和議名動遐方及歸自海南遂冺冺無聞焉陳宜中論丁大全之奸直聲聞天下至其晚節乃附奸相以求進此無他不能善養其氣故更憂患而餒耳椒丘此言自好者宜書紳然此所言猶是正氣之不克終者也若直之出於客氣者又無足論也矣原第五十四條朱子答江元徳曰所喻易中庸之說足見用心之切其間好處亦多但聖賢之言㫖意深逺仔細反復十年二十年尚未見到一二分豈可如此纔方撥冗看得一過便敢遽然立論似此恐不但解釋之義有所差錯且是氣象輕淺直與道理不相似吾輩纔舉筆不可不思此一段何曾侍晉武帝宴退謂諸子曰主上開創大業吾每宴見未嘗問經國逺圖惟說平生常事非貽厥孫謀之道也及身而已後嗣其殆乎吾輩纔開口不可不思此一段原第六十五條道聽塗說不但不能體之於身且亦辨之未必能便明蓋聽來之言或似是而非或止見一邊或言其當然而未及其所以然或言其綱而未及其目不深辨之而驟行之猶恐不勝其病痛而况徒資口說乎聽一論人之言不察而遂播為毁譽且不以為法戒而僅為毁譽聽一談理之言不察而遂𤼵為議論且不求其躬行而僅為議論其害豈可勝道原第二十七條松陽鈔存卷上
